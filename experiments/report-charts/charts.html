<meta charset="utf-8">
<style>
  .viz-root {
    --surface-1: #fcfcfb;
    --ink-1: #0b0b0b;
    --ink-2: #52514e;
    --ink-muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --series-1: #2a78d6;
    --ring: rgba(11,11,11,0.10);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--ink-1);
  }
  body { margin: 0; background: #f9f9f7; }
  figure.chart {
    margin: 24px; padding: 20px 24px; width: 760px; box-sizing: border-box;
    background: var(--surface-1); border: 1px solid var(--ring); border-radius: 12px;
  }
  .title { font-size: 16px; font-weight: 600; margin: 0 0 2px; }
  .subtitle { font-size: 12.5px; color: var(--ink-2); margin: 0 0 16px; }
  .footnote { font-size: 11px; color: var(--ink-muted); margin-top: 12px; }
  text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .tick { font-size: 11px; fill: var(--ink-muted); }
  .cat { font-size: 12.5px; fill: var(--ink-1); }
  .cat2 { font-size: 11px; fill: var(--ink-muted); }
  .val { font-size: 12px; font-weight: 600; fill: var(--ink-1); }
  .val-in { font-size: 12px; font-weight: 600; fill: #ffffff; }

  .tiles { display: flex; gap: 12px; }
  .tile {
    flex: 1; padding: 14px 16px; border: 1px solid var(--ring); border-radius: 10px;
    background: var(--surface-1);
  }
  .tile .label { font-size: 12px; color: var(--ink-2); margin-bottom: 6px; min-height: 32px; }
  .tile .value { font-size: 28px; font-weight: 600; line-height: 1.1; }
  .tile .sub { font-size: 11.5px; color: #006300; margin-top: 4px; font-weight: 500; }
</style>

<div class="viz-root">

<!-- ═══ กราฟ 1: การทดลองที่ 7 — FCP ตามโปรไฟล์เครือข่าย (แนวนอน) ═══ -->

  <p class="footnote">แอป MoneyMind (production build, หน้าแรก ~209 KB) · วัดจริง 12 ก.ค. 2026 · ข้อมูลดิบ: experiments/e2e/net-perf-results.csv</p>
</figure>
